<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f1a2c, #1e3a5f);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: white;
      padding: 40px;
      width: 320px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #0f1a2c;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #f6ac0f;
      box-shadow: 0 0 5px rgba(246,172,15,0.5);
    }

    button {
      width: 100%;
      padding: 12px;
      background: #f6ac0f;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    button:hover {
      background: #d99300;
    }
  </style>
</head>

<body>



<div class="login-container">
  <h2>Admin Login</h2>

  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
</div>
<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  let res = await fetch("https://vrinda-backend-h8oz.onrender.com/api/auth/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  let data = await res.json();

  // ✅ STEP 6.4 (THIS IS THE MAIN LINE)
  localStorage.setItem("token", data.token);

  alert("Login successful");

  // redirect to admin page
  window.location.href = "admin.html";
});
</script>

</body>
</html>
